# Copy this file to config.yaml and fill in your paths.

input_dir: "F:/Запись"
output_dir: "F:/Готовое/Шортс"

whisper:
  model: medium        # tiny | base | small | medium | large-v3
  device: auto          # auto | cuda | cpu
  language: auto        # auto, or a fixed language code like "ru"

analysis:
  # Chunk size for pass-1 candidate search. Recommended range: 20-45 minutes.
  # Smaller = more precise candidates but more subagent calls (slower/pricier).
  # Larger = cheaper but risks missing a short moment inside a big block.
  chunk_minutes: 35
  # Parallel subagents per chunk (recommended). false = one sequential pass
  # over the whole transcript instead - simpler and cheaper, but slower and
  # coarser on very long (multi-hour) recordings.
  use_subagents: true
  # Stop and show CANDIDATES.md for you to pick from before rendering.
  # false = fully automatic, rendering every candidate found.
  require_approval: true
  # Phrases (streamer/chat hype, meme call-outs) that tag a moment as extra
  # noteworthy - pass-1 uses these, and similar language, to boost a moment
  # that already stands on its own. They do NOT turn unremarkable/filler
  # surrounding text into a candidate by themselves.
  hype_phrases: ["завоз", "ору", "кринж", "база", "это база", "мем вышел", "жиза", "воу-воу"]

clip:
  min_seconds: 30
  max_seconds: 60
  # Fade video+audio to black/silence over the last N seconds of each clip
  # instead of cutting off abruptly right after the last word. 0 disables it.
  fade_seconds: 0.5

crop:
  mode: auto             # auto | zoom | pad | original-16:9

content:
  # Source material (novel readings, chat logs, etc.) can lean on profanity or
  # sexual/adult themes. true (default) = keep those moments as candidates,
  # but flag the generated metadata as 18+ so you remember to mark it
  # age-restricted on each platform before publishing. false = pass-1 skips
  # candidates that are primarily profanity/sexual humor rather than flagging
  # them.
  allow_mature: true

metadata:
  # Generate title/description/tags/caption text for posting, reusing the
  # same transcript window pass 2 already reads for trim/crop decisions.
  enabled: true
  # Which platforms to generate a block for, in one combined text file per
  # clip — handy when you post the same clip to more than one place.
  platforms: [youtube, tiktok, instagram]   # youtube | tiktok | instagram
  language: auto        # auto = same language as the transcript

facecam:
  # Set true if the recording has a webcam or VTuber avatar overlay.
  enabled: false
  # manual_region: cheap, fixed coordinates for a static overlay.
  # auto_detect: visual detection per video/scene - costs meaningfully more
  # compute and tokens; useful for VTubers with multiple models/scenes or a
  # moving camera.
  mode: manual_region
  region: null           # [x, y, w, h] as % of frame, only used in manual_region mode

subtitles:
  enabled: false
  # Arial Black: bold, full Cyrillic support, ships with Windows - reliable
  # for burned-in captions over busy gameplay footage.
  font: Arial Black
  size: 92
  color: white
  outline: black
  # Color of the word currently being spoken (karaoke-style highlight,
  # always on). Base subtitle color above is used for words before/after.
  highlight_color: yellow
  # bottom keeps a safe margin from the true bottom edge (380px of 1920) so
  # captions don't sit under TikTok/Reels/Shorts' own caption/like/comment UI.
  # For pad/original-16:9 crops, this is also the floor - captions center in
  # the black bar under the video but never sit closer to the edge than this.
  position: bottom       # bottom | top | center
  # How many words appear per subtitle cue - keeps captions short and synced
  # to speech instead of showing a whole sentence at once.
  words_per_cue: 4

audio:
  # FFmpeg noise-reduction filter (afftdn) applied to every clip's audio -
  # strips hiss/hum/fan noise picked up by the mic.
  denoise: true
  # FFmpeg loudness normalization (EBU R128 loudnorm) applied after denoise -
  # evens out volume across clips so viewers aren't reaching for the slider.
  loudnorm: true

effects:
  # Darken the frame edges for a cinematic look (FFmpeg vignette filter).
  vignette: false
  # Film-grain noise strength, 0-100 (0 = off, FFmpeg noise filter).
  grain_strength: 0
  # Zoom multiplier for a punch-in on a clip's hype/reaction moment
  # (pass 2 decides per clip whether and where to punch in - see
  # PLAN.json's punch_zoom_at). 1.15 = 15% zoom-in.
  punch_zoom_amount: 1.15
  # Seconds the punch-in takes to ramp from 1x to the full amount.
  punch_zoom_ramp: 0.25

jumpcuts:
  # Cut out long dead-air pauses from inside a clip instead of leaving
  # them in - real editing does this to keep pacing tight. Uses
  # scripts/silence.py's adaptive threshold (this file's own loudness
  # gating level, not a guessed fixed dB) to find pauses.
  enabled: false
  # Passed to ffmpeg's silencedetect as the minimum pause length to even
  # report - keep this low so short, meaningful gaps aren't missed.
  detect_min_seconds: 0.15
  # Only pauses longer than this actually get cut out; anything at or
  # under this length is left as a natural speech rhythm pause.
  cut_threshold_seconds: 0.4

visual:
  # Sample still frames per chunk (scripts/frames.py) so Claude can see
  # what's on screen instead of judging from the transcript alone - the
  # game/topic can change partway through a recording, so this runs per
  # chunk, not once for the whole video.
  enabled: false
  # Seconds between sampled frames within a chunk.
  frame_interval_seconds: 120.0
  # Label each chunk's game/topic (e.g. "Elden Ring") from its frames -
  # reused in step 5's metadata (real name beats a generic category).
  detect_game_context: true
  # Also let frames surface candidates the transcript text alone would
  # miss (a death screen, a clutch play, a visual gag).
  detect_visual_candidates: true
