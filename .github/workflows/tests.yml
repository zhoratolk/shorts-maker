name: tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # transitions + publish extras are light enough for CI and unlock their
      # test files; diarization (torch) is deliberately excluded - its tests
      # skip themselves via importorskip.
      - run: pip install -e ".[transitions,publish,dev]"
      - run: pytest -m "not integration"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
